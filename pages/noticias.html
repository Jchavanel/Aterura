<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Noticias — Escudería Aterura. Últimas novedades del automovilismo en Gran Canaria.">
  <title>Noticias — Escudería Aterura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/sections.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/nav.css">
  <style>
    .page-hero { background:var(--dark-2); padding:56px 40px 40px; border-bottom:1px solid rgba(138,170,200,0.08); }
    .page-hero-inner { max-width:1280px; margin:0 auto; }
    .breadcrumb { display:flex; align-items:center; gap:8px; font-family:var(--font-condensed); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
    .breadcrumb a { color:inherit; text-decoration:none; transition:color 0.2s; }
    .breadcrumb a:hover { color:var(--gold-light); }
    .news-page-inner { max-width:1280px; margin:0 auto; padding:56px 40px 80px; }
    .news-hero-card { display:grid; grid-template-columns:1fr 1fr; background:var(--dark-3); margin-bottom:3px; cursor:pointer; transition:background 0.2s; }
    .news-hero-card:hover { background:var(--dark-4); }
    .news-hero-img { min-height:320px; position:relative; overflow:hidden; background:var(--dark-4); }
    .news-hero-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .news-hero-img-ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    .news-hero-body { padding:40px; display:flex; flex-direction:column; justify-content:center; }
    .news-hero-badge { font-family:var(--font-condensed); font-size:11px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold-light); margin-bottom:16px; }
    .news-hero-title { font-family:var(--font-display); font-size:clamp(24px,3vw,40px); line-height:1.0; color:var(--white); margin-bottom:16px; }
    .news-hero-excerpt { font-size:15px; color:var(--light); line-height:1.7; margin-bottom:24px; }
    .news-hero-meta { font-family:var(--font-condensed); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
    .news-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:3px; }
    .news-card { background:var(--dark-3); padding:28px; cursor:pointer; display:flex; flex-direction:column; gap:10px; transition:background 0.2s; }
    .news-card:hover { background:var(--dark-4); }
    .news-card-cat { font-family:var(--font-condensed); font-size:10px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-light); }
    .news-card-title { font-family:var(--font-condensed); font-size:20px; font-weight:700; color:var(--white); line-height:1.2; }
    .news-card-excerpt { font-size:13px; color:var(--muted); line-height:1.6; flex:1; }
    .news-card-date { font-family:var(--font-condensed); font-size:11px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-top:8px; }
    .news-empty { text-align:center; padding:80px 24px; font-family:var(--font-condensed); font-size:15px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .news-loading { text-align:center; padding:80px 24px; color:var(--muted); font-family:var(--font-condensed); font-size:13px; letter-spacing:0.1em; }
    .news-loading::before { content:''; display:block; width:32px; height:32px; border:2px solid rgba(138,170,200,0.15); border-top-color:var(--gold-light); border-radius:50%; margin:0 auto 16px; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    /* Modal */
    .article-modal { display:none; position:fixed; inset:0; z-index:500; background:rgba(6,8,20,0.94); backdrop-filter:blur(8px); overflow-y:auto; padding:40px 24px; }
    .article-modal.open { display:block; }
    .article-modal-inner { max-width:780px; margin:0 auto; background:var(--dark-2); border:1px solid rgba(138,170,200,0.1); border-top:3px solid var(--gold-light); padding:48px; position:relative; }
    .article-close { position:absolute; top:20px; right:20px; background:none; border:1px solid rgba(138,170,200,0.2); color:var(--muted); width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .article-close:hover { border-color:var(--red); color:var(--red); }
    .article-cat { font-family:var(--font-condensed); font-size:11px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold-light); margin-bottom:16px; }
    .article-title { font-family:var(--font-display); font-size:clamp(28px,5vw,52px); line-height:0.95; color:var(--white); margin-bottom:20px; }
    .article-meta { font-family:var(--font-condensed); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:32px; padding-bottom:24px; border-bottom:1px solid rgba(138,170,200,0.08); }
    .article-img { width:100%; max-height:360px; object-fit:cover; display:block; margin-bottom:32px; }
    .article-body { font-size:16px; color:var(--light); line-height:1.85; }
    .article-body p { margin-bottom:20px; }
    @media (max-width:960px) {
      .page-hero { padding:40px 24px 28px; }
      .news-page-inner { padding:40px 24px 60px; }
      .news-hero-card { grid-template-columns:1fr; }
      .news-hero-img { min-height:200px; }
      .news-grid { grid-template-columns:1fr; }
      .article-modal-inner { padding:28px 20px; }
    }
  </style>
</head>
<body>

    <img src="../img/logo-aterura-white.png" alt="Escudería Aterura" width="160" height="40">
  </a>
  <ul class="nav-desktop" role="menubar">
    <li class="nav-item" role="none">
      <button role="menuitem" aria-haspopup="true" aria-expanded="false" data-dropdown="dd-esc">La Escudería
        <svg class="nav-chevron" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-dropdown" id="dd-esc" role="menu">
        <a href="../index.html#escuderia" role="menuitem">Historia</a>
        <a href="../index.html#galeria" role="menuitem">Galería</a>

        <svg class="nav-chevron" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-dropdown" id="dd-info" role="menu">
        <a href="noticias.html" role="menuitem" style="color:var(--gold-light)">Noticias</a>
        <a href="clasificaciones.html" role="menuitem">Clasificaciones</a>

  </ul>
  <button class="hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false" aria-controls="mobileMenu">
    <span></span><span></span><span></span>
  </button>
</nav>

  <a href="noticias.html" class="mob-direct" style="color:var(--gold-light)">Noticias</a>
  <a href="clasificaciones.html" class="mob-direct">Clasificaciones</a>
  <a href="../index.html#contacto" class="mob-direct">Contacto</a>
</div>

<!-- CABECERA -->
<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb">
      <a href="../index.html">Inicio</a>
      <span style="color:var(--mid)">›</span>
      <span>Noticias</span>
    </div>
    <div class="section-label">
      <div class="section-label-line"></div>
      <span class="section-label-text">Actualidad</span>
    </div>
    <h1 class="section-title" style="margin-bottom:0;">Noticias</h1>
  </div>
</div>

<!-- CONTENIDO -->
<div class="news-page-inner">
  <div id="newsContainer">
    <div class="news-loading">Cargando noticias…</div>
  </div>
</div>

<!-- MODAL artículo -->
<div class="article-modal" id="articleModal" role="dialog" aria-modal="true">
  <div class="article-modal-inner">
    <button class="article-close" id="articleClose" aria-label="Cerrar">✕</button>
    <div id="articleContent"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-bottom" style="padding-top:0;border-top:none;">
      <span class="footer-copy">&copy; <span id="year"></span> Escudería Aterura</span>
      <a href="../index.html" style="font-size:13px;color:var(--muted);text-decoration:none;">← Volver al inicio</a>
    </div>
  </div>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="../data/sync-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/animations.js"></script>

<script>
(async function () {
  'use strict';

  const container = document.getElementById('newsContainer');
  const modal     = document.getElementById('articleModal');
  const modalBody = document.getElementById('articleContent');
  const closeBtn  = document.getElementById('articleClose');

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' }); }
    catch { return iso; }
  }

  function openArticle(n) {
    const imgHtml = n.imagen
      ? `<img src="${n.imagen}" alt="${n.titulo}" class="article-img" onerror="this.style.display='none'">`
      : '';
    const bodyHtml = (n.contenido || n.extracto || '')
      .split('\n\n').filter(Boolean)
      .map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    modalBody.innerHTML = `
      <p class="article-cat">${n.categoria||'Noticias'}</p>
      <h2 class="article-title">${n.titulo}</h2>
      <p class="article-meta">${fmtDate(n.fecha)}${n.autor?` · ${n.autor}`:''}</p>
      ${imgHtml}
      <div class="article-body">${bodyHtml||'<p>Sin contenido.</p>'}</div>`;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }
  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  window._noticiasList = [];
  window.openNoticia = function(id) {
    const n = window._noticiasList.find(x => x.id === id);
    if (n) openArticle(n);
  };

  function renderNoticias(noticias) {
    const pub = noticias
      .filter(n => n.estado === 'publicada')
      .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

    if (!pub.length) {
      container.innerHTML = '<p class="news-empty">No hay noticias publicadas aún.</p>';
      return;
    }

    window._noticiasList = pub;
    const [dest, ...resto] = pub;

    const imgHero = dest.imagen
      ? `<img src="${dest.imagen}" alt="${dest.titulo}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.innerHTML='<div class=news-hero-img-ph><svg width=64 height=64 viewBox=\\'0 0 24 24\\' fill=none><rect x=3 y=3 width=18 height=18 rx=2 stroke=white stroke-width=1/></svg></div>'">`
      : `<div class="news-hero-img-ph"><svg width="64" height="64" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="white" stroke-width="1"/><circle cx="8.5" cy="8.5" r="1.5" stroke="white" stroke-width="1"/><path d="M21 15l-5-5L5 21" stroke="white" stroke-width="1" stroke-linecap="round"/></svg></div>`;

    const arrowSvg = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    let html = `
      <div class="news-hero-card" onclick="openNoticia('${dest.id}')" role="article" tabindex="0" onkeydown="if(event.key==='Enter')this.click()">
        <div class="news-hero-img">${imgHero}</div>
        <div class="news-hero-body">
          <p class="news-hero-badge">— ${dest.categoria||'Noticia destacada'}</p>
          <h2 class="news-hero-title">${dest.titulo}</h2>
          <p class="news-hero-excerpt">${dest.extracto||''}</p>
          <p class="news-hero-meta">${fmtDate(dest.fecha)}${dest.autor?` · ${dest.autor}`:''}</p>
          <div style="margin-top:24px;">
            <span class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;">
              Leer artículo ${arrowSvg}
            </span>
          </div>
        </div>
      </div>`;

    if (resto.length) {
      html += `<div class="news-grid">`;
      resto.forEach(n => {
        html += `<div class="news-card" onclick="openNoticia('${n.id}')" role="article" tabindex="0" onkeydown="if(event.key==='Enter')this.click()">
          <p class="news-card-cat">${n.categoria||'Noticias'}</p>
          <h3 class="news-card-title">${n.titulo}</h3>
          <p class="news-card-excerpt">${n.extracto||''}</p>
          <p class="news-card-date">${fmtDate(n.fecha)}</p>
        </div>`;
      });
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  try {
    const binId  = (typeof SYNC_CONFIG !== 'undefined') ? SYNC_CONFIG.bin_id : '';
    const apiUrl = (typeof SYNC_CONFIG !== 'undefined') ? SYNC_CONFIG.api_url : 'https://api.jsonbin.io/v3/b';
    if (!binId) throw new Error('sin bin_id');
    const res = await fetch(`${apiUrl}/${binId}/latest`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    renderNoticias(json.record?._noticias || []);
  } catch (e) {
    console.warn('[Noticias]', e.message);
    container.innerHTML = '<p class="news-empty">No se pudieron cargar las noticias.<br><small style="font-size:11px;color:var(--muted);letter-spacing:0">Comprueba la conexión e intenta de nuevo.</small></p>';
  }
})();
</script>

</body>
</html>
